<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pilar360 — Painel Administrativo</title>
  <link rel="stylesheet" href="/src/css/admin.css">
</head>
<body class="admin-body">

  <div class="admin-login-wrapper">
    <div class="admin-login-card">
      <img src="/imagens/logo.svg" alt="Pilar360" class="admin-login-logo">
      <h1 class="admin-login-title">Painel Administrativo</h1>
      <p class="admin-login-subtitle">Entre com suas credenciais para continuar</p>

      <div class="admin-error" id="error-msg"></div>

      <form class="admin-form" id="login-form">
        <div class="admin-form-group">
          <label for="email">E-mail</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="admin@pilar360.com.br"
            required
            autocomplete="email"
          >
        </div>
        <div class="admin-form-group">
          <label for="password">Senha</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            required
            autocomplete="current-password"
          >
        </div>
        <button type="submit" class="admin-btn-primary" id="btn-submit">Entrar</button>
      </form>
    </div>
  </div>

  <script type="module" src="/src/js/admin-login.js"></script>
</body>
</html>
